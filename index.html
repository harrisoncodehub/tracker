<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Macro Tracker">
<meta name="theme-color" content="#185FA5">
<title>Macro Tracker</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eceae3;
    --text: #1a1a18;
    --text-secondary: #6b6b66;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --blue: #185FA5;
    --green: #3B6D11;
    --amber: #BA7517;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #2a2a27;
      --bg-tertiary: #353532;
      --text: #f0efe9;
      --text-secondary: #a0a09a;
      --border: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.22);
      --blue: #4a9ee8;
      --green: #7bc043;
      --amber: #e0a040;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100%; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; overscroll-behavior: none; }

  /* Header */
  .app-header { padding: calc(var(--safe-top) + 14px) 16px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .app-title { font-size: 18px; font-weight: 600; }
  .app-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 80px); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Tab bar */
  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; background: var(--bg); border-top: 0.5px solid var(--border); padding-bottom: var(--safe-bottom); z-index: 20; }
  .tab-btn { flex: 1; padding: 10px 8px 8px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text-secondary); background: none; border: none; cursor: pointer; }
  .tab-btn.active { color: var(--blue); }
  .tab-btn .ic { display: block; font-size: 20px; margin-bottom: 2px; }

  /* Grocery */
  .progress-wrap { margin: 12px 16px 0; }
  .progress-track { background: var(--bg-secondary); border-radius: 4px; height: 7px; overflow: hidden; }
  .progress-fill { height: 7px; background: var(--blue); border-radius: 4px; transition: width .3s; width: 0%; }
  .progress-text { font-size: 11px; color: var(--text-secondary); margin: 6px 0 2px; }
  .store-grp { padding: 0 16px; }
  .store-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 8px; border-bottom: 0.5px solid var(--border); }
  .store-nm { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .store-bdg { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .store-tot { font-size: 12px; color: var(--text-secondary); }
  .gitem { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
  .gitem:last-child { border-bottom: none; }
  .gcheck { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; transition: all .15s; }
  .gitem.done .gcheck { background: var(--blue); border-color: var(--blue); }
  .gicon { width: 40px; height: 40px; border-radius: 8px; background: var(--bg-secondary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--text-secondary); }
  .gtext { flex: 1; min-width: 0; }
  .gbrand { font-size: 10px; color: var(--text-secondary); }
  .gname { font-size: 13px; }
  .gqty { font-size: 11px; color: var(--text-secondary); }
  .gitem.done .gname { text-decoration: line-through; color: var(--text-secondary); }

  /* Tracker */
  .macro-head { padding: 14px 16px; border-bottom: 0.5px solid var(--border); }
  .macro-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .mcard { background: var(--bg-secondary); border-radius: 10px; padding: 9px 6px; text-align: center; }
  .mval { font-size: 17px; font-weight: 600; }
  .mlabel { font-size: 10px; color: var(--text-secondary); }
  .mgoal { font-size: 9px; color: var(--text-secondary); }
  .mbar { height: 4px; border-radius: 2px; background: var(--bg-tertiary); overflow: hidden; margin-top: 5px; }
  .mbar > div { height: 4px; border-radius: 2px; transition: width .3s; }

  .sect { padding: 12px 16px; }
  .sect-t { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .quick-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 11px; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 20px; font-size: 11px; color: var(--text); cursor: pointer; }
  .chip:active { background: var(--bg-tertiary); }

  .meal-blk { background: var(--bg-secondary); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .meal-blk-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .meal-blk-n { font-size: 12px; font-weight: 600; }
  .meal-blk-c { font-size: 11px; color: var(--text-secondary); }
  .fentry { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); }
  .fentry:last-child { border-bottom: none; }
  .fname { font-size: 12px; }
  .fmac { font-size: 10px; color: var(--text-secondary); }
  .frem { font-size: 18px; color: var(--text-secondary); cursor: pointer; padding: 0 6px; line-height: 1; }

  .cform { background: var(--bg-secondary); border-radius: 12px; padding: 12px; }
  .cform input, .cform select { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border-strong); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); margin-bottom: 8px; font-family: inherit; }
  .cform .four { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .cform .four input { margin-bottom: 0; text-align: center; }
  .cform .row2 { display: flex; gap: 6px; align-items: center; }
  .cform .row2 select { margin-bottom: 0; flex: 1; }
  .btn { padding: 9px 16px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .btn-ghost { background: none; border: 0.5px solid var(--border-strong); color: var(--text); }

  .empty { font-size: 12px; color: var(--text-secondary); padding: 8px 0; }
  .data-actions { display: flex; gap: 8px; margin-top: 4px; }
  .data-actions .btn { flex: 1; }
  .reset-link { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 16px; }
  .reset-link span { text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title" id="hdr-title">Grocery list</div>
  <div class="app-sub" id="hdr-sub">Tap items as you shop</div>
</div>

<div class="content">

  <!-- GROCERY -->
  <div class="tab-panel active" id="panel-grocery">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
      <div class="progress-text" id="prog-txt">0 of 0 checked</div>
    </div>
    <div id="grocery-list"></div>
    <div class="reset-link">Weekly shop · ~$208/wk avg · <span onclick="resetGrocery()">Uncheck all</span></div>
  </div>

  <!-- TRACKER -->
  <div class="tab-panel" id="panel-tracker">
    <div class="macro-head">
      <div class="macro-grid">
        <div class="mcard"><div class="mval" id="t-cal">0</div><div class="mlabel">kcal</div><div class="mgoal">/ 2500</div><div class="mbar"><div id="b-cal" style="background:var(--blue);width:0%"></div></div></div>
        <div class="mcard"><div class="mval" id="t-pro" style="color:var(--blue)">0g</div><div class="mlabel">protein</div><div class="mgoal">/ 180g</div><div class="mbar"><div id="b-pro" style="background:var(--blue);width:0%"></div></div></div>
        <div class="mcard"><div class="mval" id="t-carb" style="color:var(--green)">0g</div><div class="mlabel">carbs</div><div class="mgoal">/ 158g</div><div class="mbar"><div id="b-carb" style="background:var(--green);width:0%"></div></div></div>
        <div class="mcard"><div class="mval" id="t-fat" style="color:var(--amber)">0g</div><div class="mlabel">fat</div><div class="mgoal">/ 62g</div><div class="mbar"><div id="b-fat" style="background:var(--amber);width:0%"></div></div></div>
      </div>
    </div>

    <div class="sect">
      <div class="sect-t">Quick add from your plan</div>
      <div class="quick-row" id="quick-row"></div>
    </div>

    <div class="sect" id="log-sect" style="padding-top:0;"></div>

    <div class="sect" style="padding-top:0;">
      <div class="sect-t">Log custom food</div>
      <div class="cform">
        <input id="c-name" placeholder="Food name" autocomplete="off">
        <div class="four" style="margin-bottom:8px;">
          <input id="c-cal" placeholder="kcal" type="number" inputmode="numeric">
          <input id="c-pro" placeholder="P (g)" type="number" inputmode="numeric">
          <input id="c-carb" placeholder="C (g)" type="number" inputmode="numeric">
          <input id="c-fat" placeholder="F (g)" type="number" inputmode="numeric">
        </div>
        <div class="row2">
          <select id="c-meal"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option></select>
          <button class="btn" onclick="addCustom()">Add food</button>
        </div>
      </div>
    </div>

    <div class="sect" style="padding-top:0;">
      <div class="sect-t">Your data</div>
      <div class="data-actions">
        <button class="btn btn-ghost" onclick="exportData()">Export backup</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">Import backup</button>
      </div>
      <input type="file" id="import-file" accept="application/json" style="display:none" onchange="importData(event)">
      <div class="reset-link"><span onclick="clearDay()">Clear today's log</span></div>
    </div>
  </div>

</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('grocery', this)"><span class="ic">&#128722;</span>Grocery</button>
  <button class="tab-btn" onclick="showTab('tracker', this)"><span class="ic">&#128202;</span>Tracker</button>
</div>

<script>
/* ---------- DATA ---------- */
const STORES = [
  { name:'Aldi', badge:'Weekly', color:'#0a5c1e', bg:'#d7f5e0', total:'~$45', items:[
    {brand:'Never Any!', name:'Extra lean ground beef', qty:'1 kg · ~$9', icon:'\u{1F356}'},
    {brand:'Goldhen', name:'Grade A large eggs', qty:'1 dozen · ~$2', icon:'\u{1F95A}'},
    {brand:'Happy Farms', name:'Reduced fat cheddar', qty:'6 oz · ~$3', icon:'\u{1F9C0}'},
    {brand:"L'oven Fresh", name:'Plain bagels', qty:'8-pack · ~$3', icon:'\u{1F95F}'},
    {brand:"Nature's Nectar", name:'Honey', qty:'small jar · ~$3', icon:'\u{1F36F}'},
    {brand:'Aldi produce', name:'Red bell peppers \u00d714', qty:'~$9', icon:'\u{1FAD1}'},
    {brand:'Aldi produce', name:'Sweet potatoes (1 kg)', qty:'~5 medium · ~$2', icon:'\u{1F360}'},
    {brand:'Aldi produce', name:'Bananas, garlic, lemons', qty:'~$4', icon:'\u{1F34C}'},
    {brand:'Pueblo Lindo', name:'Taco seasoning \u00d72', qty:'~$1', icon:'\u{1F336}'},
    {brand:"Dakota's Pride", name:'Black beans \u00d72 + corn', qty:'3 cans · ~$3', icon:'\u{1F96B}'},
    {brand:'Stonemill', name:'Spices + cooking spray', qty:'pantry · ~$6', icon:'\u{1F9C2}'},
  ]},
  { name:'Lidl', badge:'Weekly', color:'#1a3c6e', bg:'#e8f0fe', total:'~$28', items:[
    {brand:'Preferred Selection', name:'Atlantic salmon fillet', qty:'~2.6 lbs · ~$21', icon:'\u{1F41F}'},
    {brand:'Primadonna', name:'Extra virgin olive oil', qty:'1 bottle · ~$5', icon:'\u{1F6E2}'},
    {brand:'Stonemill Kitchens', name:'Smoked paprika', qty:'1 jar · ~$2', icon:'\u{1F336}'},
  ]},
  { name:'Walmart', badge:'Weekly', color:'#1a4f8b', bg:'#ddeeff', total:'~$106', items:[
    {brand:'Fairlife', name:'Fat-free ultra-filtered milk', qty:'2 quarts · ~$9', icon:'\u{1F95B}'},
    {brand:'Core Power', name:'Elite 42g protein shake', qty:'7 bottles · ~$37', icon:'\u{1F37C}'},
    {brand:'Barebells', name:'Protein bars (12-pack)', qty:'1 box · ~$28', icon:'\u{1F36B}'},
    {brand:'PB2', name:'Powdered peanut butter', qty:'1 jar · ~$6', icon:'\u{1F95C}'},
    {brand:'Lakanto', name:'Monk fruit sweetener', qty:'1 bag · ~$7', icon:'\u{1F33F}'},
    {brand:'Reese\u2019s Zero Sugar', name:'Mini PB cups (frozen)', qty:'1 bag · ~$5', icon:'\u2744'},
    {brand:'Olly', name:'Men\u2019s multivitamin gummies', qty:'45-day · ~$14', icon:'\u{1F48A}'},
  ]},
  { name:'Costco', badge:'Monthly', color:'#8b1a1a', bg:'#fde8e8', total:'~$85/mo', items:[
    {brand:'Kirkland Signature', name:'USDA Choice top sirloin', qty:'~8.4 lbs · ~$68', icon:'\u{1F969}'},
    {brand:'Kirkland Signature', name:'Organic baby spinach', qty:'large bag · ~$7', icon:'\u{1F96C}'},
    {brand:'Kirkland Signature', name:'Pumpkin seeds', qty:'large bag · ~$10', icon:'\u{1F331}'},
  ]},
  { name:'Harris Teeter', badge:'As needed', color:'#1a6b2e', bg:'#d9f5e0', total:'~$7', items:[
    {brand:'Applegate / HT', name:'Beef bacon (8 strips)', qty:'1 pack · ~$7', icon:'\u{1F953}'},
  ]},
  { name:'GNC', badge:'Monthly', color:'#7a4a00', bg:'#fdefd0', total:'~$50/mo', items:[
    {brand:'Legion Athletics', name:'Whey+ French Vanilla', qty:'2 lb tub · ~$50', icon:'\u{1F4AA}'},
  ]},
];

const QUICK = {
  'Breakfast sandwich': {cal:767, pro:70, carb:50, fat:12, meal:'Breakfast'},
  'Taco beef lunch':    {cal:520, pro:53, carb:50, fat:12, meal:'Lunch'},
  'PB ice cream':       {cal:390, pro:42, carb:30, fat:10, meal:'Snack'},
  'Salmon bowl':        {cal:520, pro:42, carb:28, fat:28, meal:'Dinner'},
  'Core Power shake':   {cal:230, pro:42, carb:14, fat:5,  meal:'Snack'},
  'Barebells bar':      {cal:200, pro:20, carb:20, fat:7,  meal:'Snack'},
  'Banana':             {cal:100, pro:1,  carb:27, fat:0,  meal:'Snack'},
};

const GOALS = { cal:2500, pro:180, carb:158, fat:62 };

/* ---------- STATE + STORAGE ---------- */
function todayKey() { return 'log-' + new Date().toISOString().slice(0,10); }
function loadChecks() { try { return JSON.parse(localStorage.getItem('checks') || '{}'); } catch(e){ return {}; } }
function saveChecks(c) { localStorage.setItem('checks', JSON.stringify(c)); }
function loadLog() { try { return JSON.parse(localStorage.getItem(todayKey()) || '[]'); } catch(e){ return []; } }
function saveLog(l) { localStorage.setItem(todayKey(), JSON.stringify(l)); }

let checks = loadChecks();
let log = loadLog();

/* ---------- RENDER GROCERY ---------- */
function renderGrocery() {
  let html = '';
  let total = 0, done = 0;
  STORES.forEach((store, si) => {
    html += '<div class="store-grp"><div class="store-head"><span class="store-nm">' + store.name +
      '<span class="store-bdg" style="background:' + store.color + ';color:' + store.bg + '">' + store.badge + '</span></span>' +
      '<span class="store-tot">' + store.total + '</span></div>';
    store.items.forEach((item, ii) => {
      const id = si + '-' + ii;
      const isDone = !!checks[id];
      total++; if (isDone) done++;
      html += '<div class="gitem' + (isDone ? ' done' : '') + '" onclick="toggleCheck(\'' + id + '\')">' +
        '<div class="gcheck">' + (isDone ? '\u2713' : '') + '</div>' +
        '<div class="gicon">' + item.icon + '</div>' +
        '<div class="gtext"><div class="gbrand">' + item.brand + '</div><div class="gname">' + item.name + '</div><div class="gqty">' + item.qty + '</div></div>' +
        '</div>';
    });
    html += '</div>';
  });
  document.getElementById('grocery-list').innerHTML = html;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = done + ' of ' + total + ' checked \u00b7 ' + pct + '% done';
}

function toggleCheck(id) {
  checks[id] = !checks[id];
  if (!checks[id]) delete checks[id];
  saveChecks(checks);
  renderGrocery();
}

function resetGrocery() {
  if (!confirm('Uncheck all grocery items?')) return;
  checks = {}; saveChecks(checks); renderGrocery();
}

/* ---------- RENDER TRACKER ---------- */
function renderQuick() {
  let html = '';
  Object.keys(QUICK).forEach(k => {
    html += '<div class="chip" onclick="quickAdd(\'' + k.replace(/'/g,"\\'") + '\')">' + k + '</div>';
  });
  document.getElementById('quick-row').innerHTML = html;
}

function totals() {
  return log.reduce((a,l) => ({cal:a.cal+l.cal, pro:a.pro+l.pro, carb:a.carb+l.carb, fat:a.fat+l.fat}), {cal:0,pro:0,carb:0,fat:0});
}

function renderTracker() {
  const t = totals();
  document.getElementById('t-cal').textContent = t.cal;
  document.getElementById('t-pro').textContent = t.pro + 'g';
  document.getElementById('t-carb').textContent = t.carb + 'g';
  document.getElementById('t-fat').textContent = t.fat + 'g';
  document.getElementById('b-cal').style.width = Math.min(100, Math.round(t.cal/GOALS.cal*100)) + '%';
  document.getElementById('b-pro').style.width = Math.min(100, Math.round(t.pro/GOALS.pro*100)) + '%';
  document.getElementById('b-carb').style.width = Math.min(100, Math.round(t.carb/GOALS.carb*100)) + '%';
  document.getElementById('b-fat').style.width = Math.min(100, Math.round(t.fat/GOALS.fat*100)) + '%';

  const order = ['Breakfast','Lunch','Dinner','Snack'];
  const sect = document.getElementById('log-sect');
  if (!log.length) { sect.innerHTML = '<div class="sect-t">Today\u2019s log</div><div class="empty">No foods logged yet. Tap a quick add above or log a custom food below.</div>'; return; }
  let html = '<div class="sect-t">Today\u2019s log</div>';
  order.forEach(m => {
    const items = log.map((l,idx) => ({...l, idx})).filter(l => l.meal === m);
    if (!items.length) return;
    const mc = items.reduce((s,i)=>s+i.cal,0);
    html += '<div class="meal-blk"><div class="meal-blk-h"><span class="meal-blk-n">' + m + '</span><span class="meal-blk-c">' + mc + ' kcal</span></div>';
    items.forEach(it => {
      html += '<div class="fentry"><div><div class="fname">' + it.name + '</div><div class="fmac">' + it.pro + 'g P \u00b7 ' + it.carb + 'g C \u00b7 ' + it.fat + 'g F</div></div><span class="frem" onclick="removeLog(' + it.idx + ')">\u00d7</span></div>';
    });
    html += '</div>';
  });
  sect.innerHTML = html;
}

function quickAdd(k) {
  const m = QUICK[k];
  log.push({name:k, ...m});
  saveLog(log); renderTracker();
}

function addCustom() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { alert('Enter a food name'); return; }
  const item = {
    name,
    cal: parseInt(document.getElementById('c-cal').value) || 0,
    pro: parseInt(document.getElementById('c-pro').value) || 0,
    carb: parseInt(document.getElementById('c-carb').value) || 0,
    fat: parseInt(document.getElementById('c-fat').value) || 0,
    meal: document.getElementById('c-meal').value
  };
  log.push(item); saveLog(log);
  ['c-name','c-cal','c-pro','c-carb','c-fat'].forEach(id => document.getElementById(id).value = '');
  renderTracker();
}

function removeLog(idx) {
  log.splice(idx,1); saveLog(log); renderTracker();
}

function clearDay() {
  if (!confirm('Clear all foods logged today?')) return;
  log = []; saveLog(log); renderTracker();
}

/* ---------- BACKUP ---------- */
function exportData() {
  const data = { exported: new Date().toISOString(), checks, logs: {} };
  for (let i=0; i<localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('log-')) data.logs[key] = JSON.parse(localStorage.getItem(key));
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'macro-tracker-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (data.checks) { checks = data.checks; saveChecks(checks); }
      if (data.logs) { Object.keys(data.logs).forEach(k => localStorage.setItem(k, JSON.stringify(data.logs[k]))); }
      log = loadLog();
      renderGrocery(); renderTracker();
      alert('Backup imported successfully.');
    } catch(err) { alert('Could not read that file. Make sure it\u2019s a backup exported from this app.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ---------- TABS ---------- */
function showTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'grocery') { document.getElementById('hdr-title').textContent = 'Grocery list'; document.getElementById('hdr-sub').textContent = 'Tap items as you shop'; }
  else { document.getElementById('hdr-title').textContent = 'Today\u2019s nutrition'; document.getElementById('hdr-sub').textContent = new Date().toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'}); }
}

/* ---------- INIT ---------- */
renderGrocery();
renderQuick();
renderTracker();
</script>
</body>
